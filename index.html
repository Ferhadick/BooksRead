<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leyla's Bookshelf</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <h1>Leyla's Bookshelf 📚</h1>
        <p>Before buying a book for Leyla, check this real-time list!</p>
        <button id="open-modal-btn" class="add-btn">+ Add a Book</button>
    </header>

    <main>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Search by title or author...">
        </div>
        <div id="books-grid" class="books-grid">
            <div class="loading">Reading your bookshelf...</div>
        </div>
    </main>

    <div id="book-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Add a New Book</h2>
            <form id="add-book-form">
                <div class="form-group">
                    <label>Book Title</label>
                    <input type="text" id="book-title" required placeholder="e.g., The Midnight Library">
                </div>
                <div class="form-group">
                    <label>Author Name</label>
                    <input type="text" id="book-author" required placeholder="e.g., Matt Haig">
                </div>
                <div class="form-group">
                    <label>Secret Phrase</label>
                    <input type="password" id="secret-phrase" required placeholder="Enter secret phrase">
                </div>
                <button type="submit" id="submit-btn" class="submit-btn">Save Book Instantly</button>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
